<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 640" font-family="Segoe UI, Arial, sans-serif" font-size="12">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>

  <rect width="1500" height="640" fill="#f8f9fa" rx="8"/>

  <!-- ============================================================ -->
  <!-- Entity table  (top centre) -->
  <!-- col width ~480, rows: PK + 4 props = 5 rows x 22px + header 28 = 138 -->
  <!-- ============================================================ -->
  <g>
    <rect x="460" y="30" width="480" height="148" rx="4" fill="#fff" stroke="#0078d4" stroke-width="2"/>
    <rect x="460" y="30" width="480" height="28" rx="4" fill="#0078d4"/>
    <rect x="460" y="48" width="480" height="10" fill="#0078d4"/>
    <text x="700" y="49" text-anchor="middle" fill="#fff" font-weight="bold" font-size="13">demoContinent  (entity)</text>

    <!-- header row line -->
    <line x1="460" y1="58" x2="940" y2="58" stroke="#bbb"/>

    <!-- row 1: PK -->
    <text x="470" y="74" fill="#555" font-size="10" font-style="italic">PK</text>
    <text x="495" y="74" fill="#222" font-family="Consolas,monospace" font-size="11">cln_t2dotuxm_democontinents_entityid</text>
    <text x="930" y="74" fill="#777" text-anchor="end" font-size="11">UUID</text>
    <line x1="460" y1="80" x2="940" y2="80" stroke="#eee"/>

    <!-- row 2 -->
    <text x="470" y="96" fill="#222" font-family="Consolas,monospace" font-size="11">cln_name</text>
    <text x="930" y="96" fill="#777" text-anchor="end" font-size="11">String  (Name – primary name)</text>
    <line x1="460" y1="102" x2="940" y2="102" stroke="#eee"/>

    <!-- row 3 -->
    <text x="470" y="118" fill="#222" font-family="Consolas,monospace" font-size="11">cln_continentscontinentcode</text>
    <text x="930" y="118" fill="#777" text-anchor="end" font-size="11">String</text>
    <line x1="460" y1="124" x2="940" y2="124" stroke="#eee"/>

    <!-- row 4 -->
    <text x="470" y="140" fill="#222" font-family="Consolas,monospace" font-size="11">cln_continentscontinentname</text>
    <text x="930" y="140" fill="#777" text-anchor="end" font-size="11">String</text>
    <line x1="460" y1="146" x2="940" y2="146" stroke="#eee"/>

    <!-- row 5 -->
    <text x="470" y="162" fill="#222" font-family="Consolas,monospace" font-size="11">cln_continentsid</text>
    <text x="930" y="162" fill="#777" text-anchor="end" font-size="11">String</text>
  </g>

  <!-- ============================================================ -->
  <!-- Code table  (bottom left) -->
  <!-- 3 rows: PK + Code + FK  =  3×22 + 28 = 94 -->
  <!-- ============================================================ -->
  <g>
    <rect x="30" y="370" width="430" height="116" rx="4" fill="#fff" stroke="#107c10" stroke-width="2"/>
    <rect x="30" y="370" width="430" height="28" rx="4" fill="#107c10"/>
    <rect x="30" y="388" width="430" height="10" fill="#107c10"/>
    <text x="245" y="389" text-anchor="middle" fill="#fff" font-weight="bold" font-size="13">demoContinent Code  (entity_code)</text>

    <line x1="30" y1="398" x2="460" y2="398" stroke="#bbb"/>

    <text x="40" y="414" fill="#555" font-size="10" font-style="italic">PK</text>
    <text x="65" y="414" fill="#222" font-family="Consolas,monospace" font-size="11">cln_t2dotuxm_democontinents_entity_codeid</text>
    <text x="450" y="414" fill="#777" text-anchor="end" font-size="11">UUID</text>
    <line x1="30" y1="420" x2="460" y2="420" stroke="#eee"/>

    <text x="40" y="436" fill="#222" font-family="Consolas,monospace" font-size="11">cln_code</text>
    <text x="450" y="436" fill="#777" text-anchor="end" font-size="11">String</text>
    <line x1="30" y1="442" x2="460" y2="442" stroke="#eee"/>

    <text x="40" y="458" fill="#555" font-size="10" font-style="italic">FK</text>
    <text x="65" y="458" fill="#222" font-family="Consolas,monospace" font-size="11">cln_t2dotuxm_democontinents_entity_code_entityid</text>
    <text x="450" y="458" fill="#777" text-anchor="end" font-size="11">Lookup</text>
  </g>

  <!-- ============================================================ -->
  <!-- Edge table  (bottom centre) -->
  <!-- 7 rows: PK Name Direction EdgeType From/To From/To FK  =  7×22+28=182 -->
  <!-- ============================================================ -->
  <g>
    <rect x="490" y="370" width="480" height="204" rx="4" fill="#fff" stroke="#5c2d91" stroke-width="2"/>
    <rect x="490" y="370" width="480" height="28" rx="4" fill="#5c2d91"/>
    <rect x="490" y="388" width="480" height="10" fill="#5c2d91"/>
    <text x="730" y="389" text-anchor="middle" fill="#fff" font-weight="bold" font-size="13">demoContinent Edge  (entity_edge)</text>

    <line x1="490" y1="398" x2="970" y2="398" stroke="#bbb"/>

    <text x="500" y="414" fill="#555" font-size="10" font-style="italic">PK</text>
    <text x="525" y="414" fill="#222" font-family="Consolas,monospace" font-size="11">cln_t2dotuxm_democontinents_entity_edgeid</text>
    <text x="960" y="414" fill="#777" text-anchor="end" font-size="11">UUID</text>
    <line x1="490" y1="420" x2="970" y2="420" stroke="#eee"/>

    <text x="500" y="436" fill="#222" font-family="Consolas,monospace" font-size="11">cln_name</text>
    <text x="960" y="436" fill="#777" text-anchor="end" font-size="11">String</text>
    <line x1="490" y1="442" x2="970" y2="442" stroke="#eee"/>

    <text x="500" y="458" fill="#222" font-family="Consolas,monospace" font-size="11">cln_direction</text>
    <text x="960" y="458" fill="#777" text-anchor="end" font-size="11">Picklist  (Incoming / Outgoing)</text>
    <line x1="490" y1="464" x2="970" y2="464" stroke="#eee"/>

    <text x="500" y="480" fill="#222" font-family="Consolas,monospace" font-size="11">cln_edgetype</text>
    <text x="960" y="480" fill="#777" text-anchor="end" font-size="11">String</text>
    <line x1="490" y1="486" x2="970" y2="486" stroke="#eee"/>

    <text x="500" y="502" fill="#222" font-family="Consolas,monospace" font-size="11">cln_fromreference</text>
    <text x="960" y="502" fill="#777" text-anchor="end" font-size="11">String</text>
    <line x1="490" y1="508" x2="970" y2="508" stroke="#eee"/>

    <text x="500" y="524" fill="#222" font-family="Consolas,monospace" font-size="11">cln_toreference</text>
    <text x="960" y="524" fill="#777" text-anchor="end" font-size="11">String</text>
    <line x1="490" y1="530" x2="970" y2="530" stroke="#eee"/>

    <text x="500" y="546" fill="#555" font-size="10" font-style="italic">FK</text>
    <text x="525" y="546" fill="#222" font-family="Consolas,monospace" font-size="11">cln_t2dotuxm_democontinents_entity_edge_entityid</text>
    <text x="960" y="546" fill="#777" text-anchor="end" font-size="11">Lookup</text>
  </g>

  <!-- ============================================================ -->
  <!-- Edge Property table  (bottom right) -->
  <!-- 4 rows: PK Key Value FK  =  4×22+28=116 -->
  <!-- ============================================================ -->
  <g>
    <rect x="1000" y="370" width="470" height="128" rx="4" fill="#fff" stroke="#a80000" stroke-width="2"/>
    <rect x="1000" y="370" width="470" height="28" rx="4" fill="#a80000"/>
    <rect x="1000" y="388" width="470" height="10" fill="#a80000"/>
    <text x="1235" y="389" text-anchor="middle" fill="#fff" font-weight="bold" font-size="12">demoContinent Edge Property  (entity_edge_property)</text>

    <line x1="1000" y1="398" x2="1470" y2="398" stroke="#bbb"/>

    <text x="1010" y="414" fill="#555" font-size="10" font-style="italic">PK</text>
    <text x="1035" y="414" fill="#222" font-family="Consolas,monospace" font-size="10">cln_t2dotuxm_democontinents_entity_edge_propertyid</text>
    <text x="1460" y="414" fill="#777" text-anchor="end" font-size="11">UUID</text>
    <line x1="1000" y1="420" x2="1470" y2="420" stroke="#eee"/>

    <text x="1010" y="436" fill="#222" font-family="Consolas,monospace" font-size="11">cln_key</text>
    <text x="1460" y="436" fill="#777" text-anchor="end" font-size="11">String</text>
    <line x1="1000" y1="442" x2="1470" y2="442" stroke="#eee"/>

    <text x="1010" y="458" fill="#222" font-family="Consolas,monospace" font-size="11">cln_value</text>
    <text x="1460" y="458" fill="#777" text-anchor="end" font-size="11">String</text>
    <line x1="1000" y1="464" x2="1470" y2="464" stroke="#eee"/>

    <text x="1010" y="480" fill="#555" font-size="10" font-style="italic">FK</text>
    <text x="1035" y="480" fill="#222" font-family="Consolas,monospace" font-size="10">cln_t2dotuxm_democontinents_entity_edge_property_edgeid</text>
    <text x="1460" y="480" fill="#777" text-anchor="end" font-size="11">Lookup</text>
  </g>

  <!-- ============================================================ -->
  <!-- Relationship lines -->
  <!-- ============================================================ -->

  <!-- Entity (bottom-left of entity box, x=530 y=178) -> down to Code top (x=245 y=370) -->
  <polyline points="560,178 560,270 245,270 245,370" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- 1 tick -->
  <line x1="553" y1="183" x2="567" y2="183" stroke="#555" stroke-width="1.5"/>
  <!-- crow foot (many) -->
  <line x1="238" y1="365" x2="252" y2="365" stroke="#555" stroke-width="1.5"/>
  <line x1="245" y1="358" x2="238" y2="370" stroke="#555" stroke-width="1.5"/>
  <line x1="245" y1="358" x2="252" y2="370" stroke="#555" stroke-width="1.5"/>
  <text x="575" y="220" fill="#555" font-size="11">1</text>
  <text x="200" y="350" fill="#555" font-size="11">0..*</text>

  <!-- Entity (bottom-centre, x=700 y=178) -> Edge top (x=730 y=370) -->
  <polyline points="700,178 700,310 730,310 730,370" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="693" y1="183" x2="707" y2="183" stroke="#555" stroke-width="1.5"/>
  <line x1="723" y1="365" x2="737" y2="365" stroke="#555" stroke-width="1.5"/>
  <line x1="730" y1="358" x2="723" y2="370" stroke="#555" stroke-width="1.5"/>
  <line x1="730" y1="358" x2="737" y2="370" stroke="#555" stroke-width="1.5"/>
  <text x="715" y="300" fill="#555" font-size="11">1</text>
  <text x="740" y="360" fill="#555" font-size="11">0..*</text>

  <!-- Edge (right side, x=970 y=480) -> Edge Property left (x=1000 y=450) -->
  <polyline points="970,480 985,480 985,450 1000,450" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="970" y1="473" x2="970" y2="487" stroke="#555" stroke-width="1.5"/>
  <line x1="997" y1="443" x2="1003" y2="457" stroke="#555" stroke-width="1.5"/>
  <line x1="993" y1="443" x2="999" y2="457" stroke="#555" stroke-width="1.5"/>
  <text x="972" y="472" fill="#555" font-size="11">1</text>
  <text x="988" y="442" fill="#555" font-size="11">0..*</text>

  <!-- Legend -->
  <text x="750" y="625" text-anchor="middle" fill="#888" font-size="10">PK = Primary Key  ·  FK = Foreign Key (Lookup)  ·  Cascade delete applies from parent to child tables</text>
</svg>
